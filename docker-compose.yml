version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: incenta-postgres
    environment:
      POSTGRES_USER: incenta
      POSTGRES_PASSWORD: incenta_dev
      POSTGRES_DB: incenta
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
